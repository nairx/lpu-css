<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        top: 0px;
        left:-250px;
        position: absolute;
        width: 300px;
        height: 200px;
        transition-property: left;
        transition-duration: .5s;
        transition-timing-function: ease-in;
        background-color: orange;
      }
       div:hover {
        left: 0;
        position: absolute;
      }
    </style>
  </head>
  <body>
    <div></div>
  </body>
</html>
